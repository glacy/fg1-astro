<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Horarios de atención estudiantil - II semestre 2025</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
<style>
body {
  line-height: 1.5;
  margin: 1rem;
}
#app {
  font-family: 'Courier New', courier, monospace;
  font-size: 14pt;
}

.contenedor-principal {
  width: 90%;
  margin: 0 auto;
  font-family: 'Courier New', Courier, monospace;
}

fieldset {
  margin-bottom: 10px;
}
.filtros {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 1rem;
  align-items: flex-end;
}

.filtro {
  display: flex;
  flex-direction: column;
  min-width: 150px;
  margin-right: 1em;
}

.filtro select {
  padding: 6px;
  font-family: 'Courier New', Courier, monospace;
  font-size: 14px;
}

.filtro.nombre {
  flex: 2 1 400px; /* más ancho para el campo de búsqueda */
}

input::placeholder, select::placeholder, textarea::placeholder, select, option {
  font-family: 'Courier New', courier, monospace;
  font-size: 12pt;
}

option {
  font-family: 'Courier New', courier, monospace;
  font-size: 12pt;
}

table {
  width: 90%;
  margin: auto;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #333;
  padding: 8px;
  font-family: 'courier new', courier, monospace; 
}

th {
  background-color: #3a2c60;
  color: white;
}

td.center {
  text-align: center;
}

select, input[type="text"] {
  padding: 5px;
  font-size: 1rem;
}

a {
  color: #ff6e40;
  font-family: 'Courier New', courier, monospace;
  font-size: 14pt;
}

a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div id="app">
  <p><a title="volver al inicio" href="https://tecdigital.tec.ac.cr/dotlrn/catedras.tec/catedradefsicagenerali/one-community?page_num=0&loc="><img style="display: block; margin-left: 0px;" title="Regresar al calendario" src="https://tecdigital.tec.ac.cr/repositorio/tecdigital/ESC_FISICA/img/go_back.png" alt="regresar al calendario" width="52" height="52"></a></p>
  <h1 style="text-align: center; color: #3a2c60;">Horarios de Atención Estudiantil - II Semestre 2025</h1>
<div class="row">

  <div class="col-md-10 col-sm-10 col-lg-2">
            <div class="well" style="display: inline-block;" >
            <div>
                <p><span class="material-icons-outlined" style="transform: translateY(11.5%);">meeting_room</span>: presencial </p>
                <p><span class="material-icons-outlined" style="transform: translateY(11.5%);">laptop_mac</span>: virtual</p>
            </div>
            </div>
        </div>


<div class="col-md-10 col-sm-10 col-lg-8">
  <fieldset>
    <legend>Filtros de búsqueda</legend>
    <div class="filtros">
    <div class="filtro nombre">
    <label for="docente-dropdown"><strong>Docente:</strong><br></label>
    <select v-model="busquedaDocente" id="docente-dropdown">
      <option value="">Todos</option>
      <option v-for="doc in docentes" :key="doc" :value="doc">{{ doc }}</option>
    </select>
    </div>
    <div class="filtro">
    <label for="modalidad-select"><strong>Modalidad:</strong></label>
    <select id="modalidad-select" v-model="modalidadSeleccionada">
      <option value="">Todas</option>
      <option value="presencial">Presencial</option>
      <option value="virtual">Virtual</option>
    </select>
    </div>
    
    <div class="filtro">
    <label for="dia-select"><strong>Día:</strong></label>
    <select id="dia-select" v-model="diaSeleccionado">
      <option value="">Todos</option>
      <option v-for="d in dias" :key="d" :value="d">{{ d }}</option>
    </select>
    </div>
    </div>
  </fieldset>

  <table>
    <thead>
      <tr>
        <th>Docente</th>
        <th>Modalidad</th>
        <th>Detalle</th>
      </tr>
    </thead>
    <tbody>
      <template v-for="docente in datosFiltrados">
        <tr v-for="(at, index) in docente.atenciones" :key="index">
          <td v-if="index === 0" :rowspan="docente.atenciones.length">{{ docente.docente }}</td>
          <td class="center">
            <span
              class="material-icons-outlined"
              :title="at.modalidad"
              :aria-label="at.modalidad"
              style="transform: translateY(11.5%);"
            >
              {{ at.modalidad === 'virtual' ? 'laptop_mac' : 'meeting_room' }}
            </span>
          </td>
          <td>
            <p>{{ at.dia }} de {{ at.hora }}</p>
            <p v-html="formatearLugar(at.lugar)"></p>
          </td>
        </tr>
      </template>
      <tr v-if="datosFiltrados.length === 0">
        <td colspan="3" style="text-align: center;">No se encontraron coincidencias.</td>
      </tr>
    </tbody>
  </table>
</div>
</div>
</div>
<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      busquedaDocente: "",
      modalidadSeleccionada: "",
      diaSeleccionado: "",
      dias: ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"],
      datos: [
        {
    docente: "CAMBRONERO CORDERO MICHAEL",

      {

      }
    ]
  },
  {

    atenciones: [
      {
        dia: "Miércoles",

      }
    ]
  },
  {
    docente: "CHAVES ALVAREZ MARCELA",
    atenciones: [
      {
        dia: "Martes",
        modalidad: "presencial",

      }
    ]
  },
  {
    docente: "CORDERO GARCÍA IVÁN",
    atenciones: [
      {
        dia: "Miércoles",
        modalidad: "presencial",
        hora: "3:00 p.m. a 5:00 p.m.",
        lugar: "Aula T102, Torre de Laboratorios, UTN"
      }
    ]
  },
  {
    docente: "CORRALES QUESADA ESTEBAN",
    atenciones: [
      {
        dia: "Martes",
        modalidad: "presencial",
        hora: "1:00 p.m. a 3:00 p.m.",
        lugar: "oficina 06, edificio C4 (Escuela de Física)"
      },
      {
        dia: "Jueves",
        modalidad: "presencial",
        hora: "1:00 p.m. a 3:00 p.m.",
        lugar: "oficina 06, edificio C4 (Escuela de Física)"
      }
    ]
  },
  {
    docente: "LACY MORA GERARDO",
    atenciones: [
      { dia: "Martes", modalidad: "virtual", hora: "9:30 a.m. a 10:00 a.m.", lugar: "mensaje a prof_glacy@estudiantec.cr en TEAMS" },
      { dia: "Miércoles", modalidad: "virtual", hora: "9:30 a.m. a 10:00 a.m.", lugar: "mensaje a prof_glacy@estudiantec.cr en TEAMS" },
      { dia: "Jueves", modalidad: "virtual", hora: "9:30 a.m. a 10:00 a.m.", lugar: "mensaje a prof_glacy@estudiantec.cr en TEAMS" },
      { dia: "Viernes", modalidad: "virtual", hora: "9:30 a.m. a 10:00 a.m.", lugar: "mensaje a prof_glacy@estudiantec.cr en TEAMS" }
    ]
  },
  {
    docente: "MONTERO ZELEDÓN ERNESTO",
    atenciones: [
      {
        dia: "Martes",
        modalidad: "presencial",
        hora: "1:00 p.m. a 4:00 p.m.",
        lugar: "oficina 24, edificio C4 (Escuela de Física)"
      }
    ]
  },
  {
    docente: "MURILLO SALAZAR DENNIS",
    atenciones: [
      {

        lugar: "oficina XX, edificio C4 (Escuela de Física)"
      }
    ]
  },
  {
    docente: "PINEDA LIZANO JUAN JOSÉ",
    atenciones: [
      {

      }
    ]
  },
  {
    docente: "ROJAS PÉREZ FRANCISCO",
    atenciones: [
      {
        dia: "Miércoles",
        modalidad: "presencial",

        lugar: "oficina 29, edificio C4 (Escuela de Física)"
      },
      {
        dia: "Miércoles",
        modalidad: "virtual",
        hora: "10:00 a.m. a 12:00 m.d.",

      }
    ]
  },
  {
    docente: "SEGURA CARVAJAL MARCOS",
    atenciones: [
      {

        lugar: "oficina 14, edificio C4 (Escuela de Física)"
      },
      {

      }
    ]
  },
  {
    docente: "SEGURA ZÁRATE ANA YANCY",
    atenciones: [
      {
        dia: "Miércoles",
        modalidad: "presencial",
        hora: "9:30 a.m. a 11:30 a.m.",
        lugar: "oficina 22, edificio C4 (Escuela de Física)"
      },
      {
        dia: "Viernes",
        modalidad: "presencial",
        hora: "9:30 a.m. a 11:30 a.m.",
        lugar: "oficina 22, edificio C4 (Escuela de Física)"
      }
    ]
  },
  {
    docente: "SEQUEIRA CASTRO DAVID",
    atenciones: [
      {
        dia: "Viernes",
        modalidad: "virtual",
        hora: "8:00 a.m. a 10:00 a.m.",
        lugar: "Zoom: https://itcr.zoom.us/j/83096868111?pwd=DbxNLfIakF29DvrnwORdO6wb89Qkl4.1"
      }
    ]
  }
      ]
    };
  },
  computed: {
    datosFiltrados() {
      return this.datos
        .map(doc => {
          const coincideNombre = doc.docente.toLowerCase().includes(this.busquedaDocente.toLowerCase());
          if (!coincideNombre) return null;

          const atencionesFiltradas = doc.atenciones.filter(at => {
            const filtroModalidad = this.modalidadSeleccionada ? at.modalidad === this.modalidadSeleccionada : true;
            const filtroDia = this.diaSeleccionado ? at.dia === this.diaSeleccionado : true;
            return filtroModalidad && filtroDia;
          });

          return atencionesFiltradas.length ? { docente: doc.docente, atenciones: atencionesFiltradas } : null;
        })
        .filter(Boolean);
    },
  docentes() {    // Extrae los nombres únicos

    return [...new Set(this.datos.map(d => d.docente))];
  }
  },
  methods: {
    formatearLugar(lugar) {
      const match = lugar.match(/(https?:\/\/[^\s]+)/);
      if (match) {
        const [_, url] = match;
        const texto = lugar.split(':')[0];
        return `${texto}: <a href="${url}" target="_blank" rel="noopener noreferrer"><span style="color: #ff6e40; font-size: 14pt;"><span class="material-icons-outlined" style="transform: translateY(15%);" aria-hidden="true">video_call</span>${url}</span></a>`;
      }
      return lugar;
    }
  }
}).mount("#app");
</script>
</body>
</html>
